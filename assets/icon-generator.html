<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #1a1a1a;
    gap: 20px;
  }
  canvas { border-radius: 0; }
  a {
    color: #A78BFA;
    font-family: system-ui;
    font-size: 16px;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>
<canvas id="icon" width="1024" height="1024"></canvas>
<a id="download">Download icon (1024x1024 PNG)</a>
<script>
const canvas = document.getElementById('icon');
const ctx = canvas.getContext('2d');
const W = 1024;
const C = W / 2;

// ── Background ──
// Soft warm white with subtle radial warmth
ctx.fillStyle = '#FAFAF8';
ctx.fillRect(0, 0, W, W);

// Subtle radial glow from center
const bgGlow = ctx.createRadialGradient(C, C, 0, C, C, 480);
bgGlow.addColorStop(0, 'rgba(167, 139, 250, 0.06)');
bgGlow.addColorStop(0.5, 'rgba(96, 165, 250, 0.04)');
bgGlow.addColorStop(1, 'rgba(244, 114, 182, 0.02)');
ctx.fillStyle = bgGlow;
ctx.fillRect(0, 0, W, W);

// ── Three flowing arcs (recycling/circulation symbol) ──
const radius = 270;
const arcWidth = 60;
const gapAngle = 0.42; // gap between arcs
const thirdCircle = (2 * Math.PI) / 3;

// Each arc: start, sweep, and gradient colors
const arcDefs = [
  { offset: 0, colors: ['#A78BFA', '#7C3AED'] },         // purple
  { offset: 1, colors: ['#34D399', '#0EA5E9'] },          // green → cyan
  { offset: 2, colors: ['#F472B6', '#FBBF24'] },          // pink → gold
];

function drawFlowingArc(def) {
  const baseAngle = -Math.PI / 2 + def.offset * thirdCircle;
  const startA = baseAngle + gapAngle / 2;
  const endA = baseAngle + thirdCircle - gapAngle / 2;

  // Gradient along the arc
  const sx = C + Math.cos(startA) * radius;
  const sy = C + Math.sin(startA) * radius;
  const ex = C + Math.cos(endA) * radius;
  const ey = C + Math.sin(endA) * radius;
  const grad = ctx.createLinearGradient(sx, sy, ex, ey);
  grad.addColorStop(0, def.colors[0]);
  grad.addColorStop(1, def.colors[1]);

  // Draw the arc
  ctx.beginPath();
  ctx.arc(C, C, radius, startA, endA);
  ctx.strokeStyle = grad;
  ctx.lineWidth = arcWidth;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Arrowhead — triangular, pointing along the tangent at the arc end
  const tipAngle = endA;
  const tx = C + Math.cos(tipAngle) * radius;
  const ty = C + Math.sin(tipAngle) * radius;
  const tangent = tipAngle + Math.PI / 2;
  const aSize = 38;

  ctx.save();
  ctx.translate(tx, ty);
  ctx.rotate(tangent);
  ctx.beginPath();
  ctx.moveTo(aSize * 1.1, 0);
  ctx.lineTo(-aSize * 0.4, -aSize * 0.7);
  ctx.lineTo(-aSize * 0.1, 0);
  ctx.lineTo(-aSize * 0.4, aSize * 0.7);
  ctx.closePath();
  ctx.fillStyle = def.colors[1];
  ctx.fill();
  ctx.restore();
}

// Draw subtle shadow under arcs
ctx.save();
ctx.shadowColor = 'rgba(0, 0, 0, 0.08)';
ctx.shadowBlur = 20;
ctx.shadowOffsetX = 0;
ctx.shadowOffsetY = 4;
arcDefs.forEach(drawFlowingArc);
ctx.restore();

// Draw arcs again on top (without shadow)
arcDefs.forEach(drawFlowingArc);

// ── Center sprout (hand-drawn, not emoji) ── scaled up for visibility
function drawSprout() {
  ctx.save();
  ctx.translate(C, C + 15);
  const s = 1.8; // scale factor
  ctx.scale(s, s);

  // Stem — gentle curve
  ctx.beginPath();
  ctx.moveTo(0, 50);
  ctx.quadraticCurveTo(-3, 15, 5, -15);
  ctx.strokeStyle = '#16A34A';
  ctx.lineWidth = 9;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Left leaf
  ctx.beginPath();
  ctx.moveTo(0, -8);
  ctx.quadraticCurveTo(-60, -65, -12, -88);
  ctx.quadraticCurveTo(10, -50, 0, -8);
  const leftLeafGrad = ctx.createLinearGradient(-45, -88, 5, -8);
  leftLeafGrad.addColorStop(0, '#4ADE80');
  leftLeafGrad.addColorStop(1, '#16A34A');
  ctx.fillStyle = leftLeafGrad;
  ctx.fill();

  // Left leaf vein
  ctx.beginPath();
  ctx.moveTo(0, -14);
  ctx.quadraticCurveTo(-22, -45, -10, -70);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Right leaf (slightly larger, tilted up)
  ctx.beginPath();
  ctx.moveTo(6, -20);
  ctx.quadraticCurveTo(72, -88, 22, -108);
  ctx.quadraticCurveTo(-5, -65, 6, -20);
  const rightLeafGrad = ctx.createLinearGradient(55, -108, 0, -20);
  rightLeafGrad.addColorStop(0, '#86EFAC');
  rightLeafGrad.addColorStop(1, '#22C55E');
  ctx.fillStyle = rightLeafGrad;
  ctx.fill();

  // Right leaf vein
  ctx.beginPath();
  ctx.moveTo(8, -26);
  ctx.quadraticCurveTo(32, -60, 20, -85);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();
}

drawSprout();

// ── Small sparkles ──
function drawSparkle(x, y, size, color, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = alpha || 0.6;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.quadraticCurveTo(size * 0.15, -size * 0.15, size, 0);
  ctx.quadraticCurveTo(size * 0.15, size * 0.15, 0, size);
  ctx.quadraticCurveTo(-size * 0.15, size * 0.15, -size, 0);
  ctx.quadraticCurveTo(-size * 0.15, -size * 0.15, 0, -size);
  ctx.fill();
  ctx.restore();
}

const sparkles = [
  { x: 160, y: 155, size: 16, color: '#A78BFA', alpha: 0.5 },
  { x: 855, y: 185, size: 12, color: '#60A5FA', alpha: 0.45 },
  { x: 880, y: 780, size: 14, color: '#34D399', alpha: 0.5 },
  { x: 170, y: 830, size: 13, color: '#FBBF24', alpha: 0.45 },
  { x: 510, y: 120, size: 10, color: '#F472B6', alpha: 0.4 },
  { x: 900, y: 490, size: 11, color: '#A78BFA', alpha: 0.35 },
  { x: 135, y: 500, size: 12, color: '#34D399', alpha: 0.4 },
  { x: 540, y: 900, size: 10, color: '#60A5FA', alpha: 0.35 },
];

sparkles.forEach(s => drawSparkle(s.x, s.y, s.size, s.color, s.alpha));

// ── Download link ──
document.getElementById('download').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'watasu-icon-1024.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
